name: Build and Push

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  # ─── Job 1: Detect which services changed ──────────────────────────────────
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      services:     ${{ steps.matrix.outputs.services }}
      services-csv: ${{ steps.matrix.outputs.services_csv }}
      any-changed:  ${{ steps.matrix.outputs.any_changed }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect changed service directories
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            admin-server:
              - 'spring-petclinic-admin-server/**'
            api-gateway:
              - 'spring-petclinic-api-gateway/**'
            config-server:
              - 'spring-petclinic-config-server/**'
            customers-service:
              - 'spring-petclinic-customers-service/**'
            discovery-server:
              - 'spring-petclinic-discovery-server/**'
            genai-service:
              - 'spring-petclinic-genai-service/**'
            vets-service:
              - 'spring-petclinic-vets-service/**'
            visits-service:
              - 'spring-petclinic-visits-service/**'

      - name: Build matrix from changed services
        id: matrix
        run: |
          services=()
          [[ "${{ steps.filter.outputs.admin-server }}"      == "true" ]] && services+=(admin-server)
          [[ "${{ steps.filter.outputs.api-gateway }}"       == "true" ]] && services+=(api-gateway)
          [[ "${{ steps.filter.outputs.config-server }}"     == "true" ]] && services+=(config-server)
          [[ "${{ steps.filter.outputs.customers-service }}" == "true" ]] && services+=(customers-service)
          [[ "${{ steps.filter.outputs.discovery-server }}"  == "true" ]] && services+=(discovery-server)
          [[ "${{ steps.filter.outputs.genai-service }}"     == "true" ]] && services+=(genai-service)
          [[ "${{ steps.filter.outputs.vets-service }}"      == "true" ]] && services+=(vets-service)
          [[ "${{ steps.filter.outputs.visits-service }}"    == "true" ]] && services+=(visits-service)

          if [[ ${#services[@]} -eq 0 ]]; then
            echo "services=[]"        >> "$GITHUB_OUTPUT"
            echo "services_csv="      >> "$GITHUB_OUTPUT"
            echo "any_changed=false"  >> "$GITHUB_OUTPUT"
          else
            json=$(printf '"%s",' "${services[@]}" | sed 's/,$//')
            echo "services=[${json}]"              >> "$GITHUB_OUTPUT"
            echo "services_csv=${services[*]}"     >> "$GITHUB_OUTPUT"
            echo "any_changed=true"                >> "$GITHUB_OUTPUT"
          fi

  # ─── Job 2: Build, scan, push — one matrix entry per changed service ───────
  build-and-push:
    needs: detect-changes
    if: needs.detect-changes.outputs.any-changed == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services) }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven

      - name: Set up QEMU (ARM64 cross-compilation support)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Maven build (single service + dependencies, skip tests)
        run: |
          ./mvnw clean package \
            -pl spring-petclinic-${{ matrix.service }} \
            --also-make \
            -DskipTests \
            --no-transfer-progress

      - name: Build Docker image (linux/arm64)
        env:
          SERVICE: ${{ matrix.service }}
        run: |
          SHA7="${GITHUB_SHA::7}"
          REGISTRY="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com"
          IMAGE="${REGISTRY}/petclinic-dev/${SERVICE}:${SHA7}"
          echo "IMAGE=${IMAGE}" >> "$GITHUB_ENV"

          case "${SERVICE}" in
            admin-server)      PORT=9090 ;;
            api-gateway)       PORT=8080 ;;
            config-server)     PORT=8888 ;;
            customers-service) PORT=8081 ;;
            discovery-server)  PORT=8761 ;;
            genai-service)     PORT=8084 ;;
            vets-service)      PORT=8083 ;;
            visits-service)    PORT=8082 ;;
          esac

          ARTIFACT="spring-petclinic-${SERVICE}"
          # Rename JAR to match Dockerfile ARTIFACT_NAME build arg (strips version suffix)
          JAR=$(ls "spring-petclinic-${SERVICE}/target/${ARTIFACT}"-*.jar | grep -v original | head -1)
          cp "${JAR}" "spring-petclinic-${SERVICE}/target/${ARTIFACT}.jar"

          docker buildx build \
            --platform linux/arm64 \
            -f docker/Dockerfile \
            --build-arg ARTIFACT_NAME="${ARTIFACT}" \
            --build-arg EXPOSED_PORT="${PORT}" \
            -t "${IMAGE}" \
            "spring-petclinic-${SERVICE}/target/" \
            --load

      - name: Trivy scan (fail on CRITICAL CVEs)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ env.IMAGE }}
          format: table
          exit-code: '1'
          ignore-unfixed: false
          severity: CRITICAL

      - name: Push to ECR
        run: docker push "${{ env.IMAGE }}"

  # ─── Job 3: Notify platform repo to update Helm image tags ─────────────────
  dispatch:
    needs: [detect-changes, build-and-push]
    if: needs.build-and-push.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Fire repository_dispatch to platform repo
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PLATFORM_REPO_TOKEN }}
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: 'rajdev0ps',
              repo:  'petclinic-platform',
              event_type: 'app-image-built',
              client_payload: {
                sha:      '${{ github.sha }}'.substring(0, 7),
                services: '${{ needs.detect-changes.outputs.services-csv }}'
              }
            });
