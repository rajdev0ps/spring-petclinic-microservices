name: ECR Login (Reusable)

on:
  workflow_call:
    inputs:
      aws-region:
        description: AWS region where ECR is hosted
        required: true
        type: string
      role-arn:
        description: IAM role ARN to assume via OIDC
        required: true
        type: string
    outputs:
      registry:
        description: ECR registry URL (e.g. 123456789012.dkr.ecr.us-east-1.amazonaws.com)
        value: ${{ jobs.login.outputs.registry }}

permissions:
  id-token: write
  contents: read

jobs:
  login:
    runs-on: ubuntu-latest
    outputs:
      registry: ${{ steps.ecr.outputs.registry }}
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.role-arn }}
          aws-region: ${{ inputs.aws-region }}

      - name: Login to ECR and output registry URL
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2
